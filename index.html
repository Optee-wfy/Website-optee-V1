<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- SEO base -->
    <title>Optee — Rénovation énergétique intelligente des bâtiments professionnels</title>
    <meta name="description" content="Optee automatise l'analyse énergétique de vos bâtiments professionnels : diagnostic en 2 minutes, identification des aides CEE et MaPrimeRénov', conformité Décret Tertiaire. Plus de 5 millions de bâtiments couverts en France." />
    <meta name="keywords" content="rénovation énergétique, bâtiment professionnel, audit énergétique, CEE, décret tertiaire, DPE, MaPrimeRénov, GTB, isolation tertiaire, aides rénovation entreprise" />
    <meta name="author" content="Optee" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://optee.io/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Optee" />
    <meta property="og:title" content="Optee — Rénovation énergétique intelligente des bâtiments professionnels" />
    <meta property="og:description" content="Optee automatise l'analyse énergétique de vos bâtiments professionnels : diagnostic en 2 minutes, aides financières, conformité réglementaire." />
    <meta property="og:url" content="https://optee.io/" />
    <meta property="og:image" content="https://optee.io/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@optee_io" />
    <meta name="twitter:title" content="Optee — Rénovation énergétique intelligente" />
    <meta name="twitter:description" content="Diagnostic énergétique automatique, aides financières et conformité réglementaire pour vos bâtiments professionnels." />
    <meta name="twitter:image" content="https://optee.io/og-image.png" />

    <!-- Geo / Local SEO -->
    <meta name="geo.region" content="FR" />
    <meta name="geo.placename" content="France" />
    <meta name="language" content="French" />

    <!-- Structured Data : Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Optee",
      "url": "https://optee.io",
      "logo": "https://optee.io/favicon.svg",
      "description": "Plateforme SaaS B2B d'analyse et de planification de la rénovation énergétique des bâtiments professionnels en France.",
      "areaServed": { "@type": "Country", "name": "France" },
      "knowsAbout": [
        "Rénovation énergétique bâtiment professionnel",
        "Audit énergétique tertiaire",
        "Certificats d'Économie d'Énergie",
        "Décret Tertiaire",
        "DPE bâtiment professionnel",
        "MaPrimeRénov Copropriétés",
        "GTB gestion technique bâtiment",
        "Fonds Chaleur ADEME"
      ],
      "sameAs": ["https://pisteur.tech"],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "url": "https://optee.io/contact",
        "availableLanguage": "French"
      }
    }
    </script>

    <!-- Structured Data : WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Optee",
      "url": "https://optee.io",
      "description": "Plateforme d'analyse énergétique automatique pour bâtiments professionnels",
      "inLanguage": "fr-FR",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://optee.io/ressources?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data : SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Optee",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "url": "https://optee.io",
      "description": "Logiciel SaaS d'analyse énergétique automatique pour bâtiments professionnels. Diagnostic en 2 minutes, identification des aides financières, conformité Décret Tertiaire.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR",
        "description": "Découverte gratuite — analyse d'un premier bâtiment offerte"
      },
      "featureList": [
        "Analyse automatique par adresse",
        "Identification des aides CEE et MaPrimeRénov",
        "Conformité Décret Tertiaire et BACS",
        "Marketplace de professionnels RGE",
        "API REST",
        "Portefeuille multi-bâtiments"
      ],
      "inLanguage": "fr-FR"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
